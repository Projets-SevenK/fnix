document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:space-between; align-items:baseline; padding:13px 0; border-bottom:1px solid rgba(255,255,255,0.06);\"><span style=\"font-family:'Archivo'; font-size:14px; color:#86868C;\">Tailles<\u002Fspan><span style=\"font-family:'Archivo'; font-size:14px; color:#e6e6e8; font-weight:500; text-align:right;\">S · M · L · XL<br><span style=\"font-size:12px; color:#7a7a80; font-weight:400;\">selon stock disponible<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:13px 0; border-bottom:1px solid rgba(255,255,255,0.06);\"><span style=\"font-family:'Archivo'; font-size:14px; color:#86868C;\">Stock<\u002Fspan><span style=\"font-family:'Archivo'; font-size:14px; color:#1183E6; font-weight:600;\">Limité<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:13px 0;\"><span style=\"font-family:'Archivo'; font-size:14px; color:#86868C;\">Livraison<\u002Fspan><span style=\"font-family:'Archivo'; font-size:14px; color:#e6e6e8; font-weight:500;\">La Poste<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"#commander\" style=\"display:block; text-align:center; margin-top:26px; font-family:'Archivo'; font-weight:700; font-size:15px; color:#fff; background:#1183E6; padding:16px; border-radius:9px; text-decoration:none;\" style-hover=\"background:#2e97f5;\">Passer commande<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- STORY -->\n  <div id=\"histoire\" style=\"position:relative; padding:100px 6vw; background:#08080a; border-top:1px solid rgba(255,255,255,0.06); overflow:hidden;\">\n    <span style=\"position:absolute; bottom:-60px; right:4vw; font-family:'Anton',sans-serif; font-size:340px; color:rgba(255,255,255,0.025); line-height:0.7; pointer-events:none;\">44<\u002Fspan>\n    <div style=\"position:relative; z-index:2; max-width:1180px; margin:0 auto;\">\n      <div style=\"max-width:780px;\">\n        <div style=\"font-family:'Space Mono',monospace; font-size:12px; letter-spacing:3px; color:#1183E6; text-transform:uppercase; margin-bottom:20px;\">// Histoire<\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif; font-size:56px; line-height:1.04; color:#f4f4f3; text-transform:uppercase; letter-spacing:-0.01em; margin-bottom:30px;\">Une marque née<br>d'un héritage<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-size:19px; color:#b9b9bf; line-height:1.75; max-width:680px;\">FNIX est né d'un hommage familial. Le nom réunit <span style=\"color:#fff; font-weight:600;\">Félix<\u002Fspan>, le prénom du père du créateur, et le <span style=\"color:#fff; font-weight:600;\">ñ<\u002Fspan> inspiré de sa mère, <span style=\"color:#fff; font-weight:600;\">Madalena<\u002Fspan>. Le point bleu symbolise son attachement à cette couleur, mais aussi la confiance, l'évolution et la profondeur. FNIX porte une vision&nbsp;: <span style=\"color:#1183E6; font-weight:600;\">avancer avec ambition, sans oublier le respect.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- VALUES -->\n  <div style=\"padding:96px 6vw; background:#060608;\">\n   <div style=\"max-width:1180px; margin:0 auto;\">\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px;\">\n      <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:34px;\">\n        <div style=\"width:34px; height:4px; background:#1183E6; margin-bottom:26px;\"><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:12px; color:#56565c; letter-spacing:2px; margin-bottom:8px;\">01<\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif; font-size:34px; color:#f4f4f3; text-transform:uppercase; margin-bottom:12px;\">Respect<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-size:15px; color:#9a9aa0; line-height:1.6;\">Une valeur qui se perd aujourd'hui. FNIX la remet au centre.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:34px;\">\n        <div style=\"width:34px; height:4px; background:#1183E6; margin-bottom:26px;\"><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:12px; color:#56565c; letter-spacing:2px; margin-bottom:8px;\">02<\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif; font-size:34px; color:#f4f4f3; text-transform:uppercase; margin-bottom:12px;\">Ambition<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-size:15px; color:#9a9aa0; line-height:1.6;\">Commencer petit, viser grand. Construire quelque chose de fort.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:34px;\">\n        <div style=\"width:34px; height:4px; background:#1183E6; margin-bottom:26px;\"><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace; font-size:12px; color:#56565c; letter-spacing:2px; margin-bottom:8px;\">03<\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif; font-size:34px; color:#f4f4f3; text-transform:uppercase; margin-bottom:12px;\">Évolution<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif; font-size:15px; color:#9a9aa0; line-height:1.6;\">Avancer, drop après drop. Le 044 n'est qu'un début.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ORDER -->\n  <div id=\"commander\" style=\"padding:96px 6vw; background:#08080a; border-top:1px solid rgba(255,255,255,0.06);\">\n   <div style=\"max-width:1180px; margin:0 auto;\">\n    <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:14px;\">\n      <span style=\"font-family:'Space Mono',monospace; font-size:12px; letter-spacing:3px; color:#1183E6; text-transform:uppercase;\">// Commander<\u002Fspan>\n      <span style=\"width:30px; height:1px; background:rgba(17,131,230,0.5);\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-family:'Anton',sans-serif; font-size:50px; line-height:1.0; color:#f4f4f3; text-transform:uppercase; letter-spacing:-0.01em; margin-bottom:10px;\">Un processus simple<\u002Fdiv>\n    <div style=\"font-family:'Archivo'; font-size:16px; color:#9a9aa0; max-width:620px; line-height:1.55; margin-bottom:44px;\">Ta commande est <span style=\"color:#e6e6e8; font-weight:600;\">enregistrée à l'envoi du formulaire<\u002Fspan>. Le paiement Wero est <span style=\"color:#e6e6e8; font-weight:600;\">manuel<\u002Fspan> et se fait juste après&nbsp;: ta commande n'est validée qu'<span style=\"color:#1183E6; font-weight:600;\">après réception du paiement<\u002Fspan>.<\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:48px;\">\n      <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px;\"><div style=\"font-family:'Anton'; font-size:30px; color:#1183E6; margin-bottom:10px;\">01<\u002Fdiv><div style=\"font-family:'Archivo'; font-weight:600; font-size:15px; color:#e6e6e8; margin-bottom:4px;\">Choisis ta taille<\u002Fdiv><div style=\"font-family:'Archivo'; font-size:13px; color:#86868C;\">Selon le stock.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px;\"><div style=\"font-family:'Anton'; font-size:30px; color:#1183E6; margin-bottom:10px;\">02<\u002Fdiv><div style=\"font-family:'Archivo'; font-weight:600; font-size:15px; color:#e6e6e8; margin-bottom:4px;\">Renseigne tes infos<\u002Fdiv><div style=\"font-family:'Archivo'; font-size:13px; color:#86868C;\">Commande enregistrée.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:24px;\"><div style=\"font-family:'Anton'; font-size:30px; color:#1183E6; margin-bottom:10px;\">03<\u002Fdiv><div style=\"font-family:'Archivo'; font-we :16px;\">\n                <div style=\"font-family:'Anton'; font-size:38px; line-height:1.02; color:#f4f4f3; text-transform:uppercase; margin-bottom:16px;\">Respect.<br>Ambition.<br><span style=\"color:#1183E6;\">Évolution.<\u002Fspan><\u002Fdiv>\n                <div style=\"width:100%; height:210px; background:repeating-linear-gradient(135deg,#0d0d10 0,#0d0d10 11px,#131318 11px,#131318 22px); border:1px solid rgba(255,255,255,0.08); border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:16px;\"><span style=\"font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:#56565c; text-transform:uppercase;\">[ T-shirt porté ]<\u002Fspan><\u002Fdiv>\n                <a href=\"#\" style=\"display:block; text-align:center; font-family:'Archivo'; font-weight:700; font-size:14px; color:#fff; background:#1183E6; padding:14px; border-radius:9px; text-decoration:none; margin-bottom:10px;\">Commander la pièce<\u002Fa>\n                <a href=\"#\" style=\"display:block; text-align:center; font-family:'Archivo'; font-weight:600; font-size:14px; color:#e6e6e8; border:1px solid rgba(255,255,255,0.18); padding:14px; border-radius:9px; text-decoration:none;\">Découvrir l'histoire<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center; margin-top:12px; font-family:'Space Mono'; font-size:10px; letter-spacing:2px; color:#56565c; text-transform:uppercase;\">Hero<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- phone 2 -->\n      <div style=\"width:320px;\">\n        <div style=\"border-radius:42px; border:9px solid #1a1a1f; background:#060608; box-shadow:0 30px 70px rgba(0,0,0,0.6); overflow:hidden;\">\n          <div style=\"height:30px; display:flex; align-items:center; justify-content:center;\"><div style=\"width:90px; height:7px; border-radius:10px; background:#1a1a1f;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"height:600px; overflow:hidden; padding:24px 20px;\">\n            <div style=\"font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:#1183E6; text-transform:uppercase; margin-bottom:10px;\">// La pièce<\u002Fdiv>\n            <div style=\"font-family:'Anton'; font-size:32px; line-height:1.0; color:#f4f4f3; text-transform:uppercase; margin-bottom:16px;\">La première<br>pièce FNIX<\u002Fdiv>\n            <div style=\"width:100%; height:240px; background:repeating-linear-gradient(135deg,#0d0d10 0,#0d0d10 11px,#131318 11px,#131318 22px); border:1px solid rgba(255,255,255,0.08); border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; position:relative;\"><span style=\"font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:#56565c;\">[ Détail logo avant ]<\u002Fspan><div style=\"position:absolute; top:12px; right:14px; font-family:'Space Mono'; font-size:10px; color:#2f2f35; letter-spacing:2px;\">044<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px;\">\n              <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06);\"><span style=\"font-family:'Archivo'; font-size:13px; color:#86868C;\">Couleur<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">Une seule<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06);\"><span style=\"font-family:'Archivo'; font-size:13px; color:#86868C;\">Tailles<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">S–XL · stock<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; padding:8px 0;\"><span style=\"font-family:'Archivo'; font-size:13px; color:#86868C;\">Prix<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">à confirmer<\u002Fspan><\u002Fdiv>\n              <a href=\"#\" style=\"display:block; text-align:center; margin-top:14px; font-family:'Archivo'; font-weight:700; font-size:14px; color:#fff; background:#1183E6; padding:13px; border-radius:9px; text-decoration:none;\">Passer commande<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center; margin-top:12px; font-family:'Space Mono'; font-size:10px; letter-spacing:2px; color:#56565c; text-transform:uppercase;\">Produit<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- phone 3 -->\n      <div style=\"width:320px;\">\n        <div style=\"border-radius:42px; border:9px solid #1a1a1f; background:#060608; box-shadow:0 30px 70px rgba(0,0,0,0.6); overflow:hidden;\">\n          <div style=\"height:30px; display:flex; align-items:center; justify-content:center;\"><div style=\"width:90px; height:7px; border-radius:10px; background:#1a1a1f;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"height:600px; overflow:hidden; padding:24px 20px;\">\n            <div style=\"font-family:'Space Mono'; font-size:11px; letter-spacing:2px; color:#1183E6; text-transform:uppercase; margin-bottom:10px;\">// Commander<\u002Fdiv>\n            <div style=\"font-family:'Anton'; font-size:30px; color:#f4f4f3; text-transform:uppercase; margin-bottom:16px;\">4 étapes<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:9px; margin-bottom:16px;\">\n              <div style=\"display:flex; gap:14px; align-items:center; background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:13px 15px;\"><span style=\"font-family:'Anton'; font-size:20px; color:#1183E6;\">01<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">Choisis ta taille<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; gap:14px; align-items:center; background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:13px 15px;\"><span style=\"font-family:'Anton'; font-size:20px; color:#1183E6;\">02<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">Tes infos de livraison<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; gap:14px; align-items:center; background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:13px 15px;\"><span style=\"font-family:'Anton'; font-size:20px; color:#1183E6;\">03<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">Paiement manuel · Wero<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex; gap:14px; align-items:center; background:#0c0c0f; border:1px solid rgba(255,255,255,0.08); border-radius:11px; padding:13px 15px;\"><span style=\"font-family:'Anton'; font-size:20px; color:#1183E6;\">04<\u002Fspan><span style=\"font-family:'Archivo'; font-size:13px; color:#e6e6e8;\">Validation &amp; envoi<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:linear-gradient(180deg,#0e1015,#0a0a0d); border:1px solid rgba(17,131,230,0.22); border-radius:12px; padding:15px;\">\n              <div style=\"font-family:'Archivo'; font-size:12px; color:#7a7a80; line-height:1.5;\"><span style=\"color:#1183E6;\">★<\u002Fspan> Paiement Wero manuel après le formulaire. Commande validée dès réception du paiement.<\u002Fdiv>\n              <a href=\"#\" style=\"display:block; text-align:center; margin-top:13px; font-family:'Archivo'; font-weight:700; font-size:13px; color:#fff; background:#1183E6; padding:13px; border-radius:9px; text-decoration:none;\">Enregistrer → Wero<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center; margin-top:12px; font-family:'Space Mono'; font-size:10px; letter-spacing:2px; color:#56565c; text-transform:uppercase;\">Commande<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    selectedSize: null,\n    qty: 1,\n    form: { firstName:'', lastName:'', email:'', phone:'', address:'', comment:'' },\n    errors: [],\n    submitted: false,\n    orderRef: null,\n    openFaq: 0,\n  };\n\n  handleField(e){\n    const name = e.target.name, value = e.target.value;\n    this.setState(s => ({ form: Object.assign({}, s.form, { [name]: value }) }));\n  }\n  selectSize(s){ this.setState({ selectedSize: s, submitted: false, errors: [] }); }\n  changeQty(d){ this.setState(st => ({ qty: Math.max(1, Math.min(5, st.qty + d)) })); }\n  toggleFaq(i){ this.setState(st => ({ openFaq: st.openFaq === i ? -1 : i })); }\n  submit(){\n    const f = this.state.form, errs = [];\n    if(!f.firstName.trim()) errs.push('Prénom');\n    if(!f.lastName.trim()) errs.push('Nom');\n    if(!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(f.email)) errs.push('Email');\n    if(!f.phone.trim()) errs.push('Téléphone');\n    if(!f.address.trim()) errs.push('Adresse');\n    if(!this.state.selectedSize) errs.push('Taille');\n    if(errs.length){ this.setState({ errors: errs, submitted: false }); return; }\n    const ref = 'CMD-044-' + Math.floor(1000 + Math.random()*9000);\n    this.setState({ errors: [], submitted: true, orderRef: ref });\n  }\n\n  renderVals(){\n    const st = this.state;\n    const accent = '#1183E6';\n    const sizes = ['S','M','L','XL'];\n    const sizeOptions = sizes.map(label => {\n      const selected = st.selectedSize === label;\n      return {\n        label,\n        onClick: () => this.selectSize(label),\n        style: {\n          flex: '1', padding: '14px 0', textAlign: 'center', cursor: 'pointer',\n          fontFamily: \"'Archivo',sans-serif\", fontWeight: '700', fontSize: '15px', letterSpacing: '1px',\n          border: selected ? '1px solid ' + accent : '1px solid rgba(255,255,255,0.14)',\n          background: selected ? accent : 'transparent',\n          color: selected ? '#fff' : '#cfcfd4',\n          borderRadius: '8px', transition: 'all .15s',\n          boxShadow: selected ? '0 0 0 4px rgba(17,131,230,0.18)' : 'none',\n        },\n      };\n    });\n\n    const faqData = [\n      { q:'Comment se passe le paiement ?', a:\"Après l'envoi de ton formulaire, ta commande est enregistrée et tu es redirigé vers un lien Wero pour régler manuellement. Indique bien ta référence de commande dans le message du paiement.\" },\n      { q:'Quand ma commande est-elle validée ?', a:\"Ta commande n'est validée qu'après réception de ton paiement Wero. Le propriétaire vérifie chaque commande, puis la confirme avant expédition — tu reçois une confirmation par email.\" },\n      { q:'Comment se passe la livraison ?', a:\"Chaque pièce est expédiée via La Poste après validation du paiement. Le délai dépend de ta zone de livraison.\" },\n      { q:'Puis-je retourner le produit ?', a:\"Les modalités de retour seront précisées dans les conditions de vente. En cas de problème avec ta commande, tu peux contacter FNIX directement.\" },\n      { q:'Le t-shirt est-il disponible en plusieurs couleurs ?', a:\"Le premier drop FNIX est volontairement proposé en une seule couleur — une première empreinte. D'autres couleurs pourront suivre.\" },\n    ];\n    const faqItems = faqData.map((f, i) => {\n      const open = st.openFaq === i;\n      return {\n        q: f.q, a: f.a, n: String(i+1).padStart(2,'0'),\n        onClick: () => this.toggleFaq(i),\n        qColor: open ? '#ffffff' : '#e6e6e8',\n        iconStyle: { display:'inline-block', transition:'transform .25s, color .25s', transform: open ? 'rotate(45deg)':'rotate(0deg)', color: open ? accent : '#86868C', fontSize:'26px', fontWeight:'300', lineHeight:'1' },\n        bodyStyle: { overflow:'hidden', transition:'max-height .3s ease, opacity .25s', maxHeight: open ? '260px':'0px', opacity: open ? 1 : 0 },\n      };\n    });\n\n    return {\n      sizeOptions,\n      faqItems,\n      onField: (e) => this.handleField(e),\n      qty: st.qty,\n      incQty: () => this.changeQty(1),\n      decQty: () => this.changeQty(-1),\n      submit: () => this.submit(),\n      selectedSizeText: st.selectedSize || '—',\n      hasErrors: st.errors.length > 0,\n      errorsText: st.errors.join('  ·  '),\n      submitted: st.submitted,\n      orderRef: st.orderRef,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
